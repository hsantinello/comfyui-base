name: Build and Push to GHCR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Liberar espaco em disco
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache
          sudo docker system prune -af
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build e push da imagem
        uses: docker/bake-action@v5
        with:
          push: true
          files: ./docker-bake.hcl
          targets: regular
          set: |
            regular.tags=ghcr.io/${{ github.repository_owner }}/comfyui-runpod:latest

      - name: Resumo
        run: |
          echo "Imagem publicada:"
          echo "  ghcr.io/${{ github.repository_owner }}/comfyui-runpod:latest"
